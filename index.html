<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
    --bg: #000000;
    --card-bg: #0a0a0a;
    --glow-color: #ffffff;
    --text-main: #ffffff;
    --text-dim: #888888;
    --accent-border: #222222;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

/* CONTAINER ANIMATION */
.card {
    background: var(--card-bg);
    width: 85%;
    max-width: 350px;
    padding: 30px;
    border-radius: 24px;
    border: 1px solid var(--accent-border);
    position: relative;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* THE GLOW EFFECT */
.card::before {
    content: "";
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #000, #444, #000);
    z-index: -1;
    border-radius: 26px;
    animation: borderGlow 4s linear infinite;
}

h2 {
    margin: 10px 0;
    font-weight: 600;
    letter-spacing: -0.5px;
    text-transform: uppercase;
}

.sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

/* QR SECTION */
.qr {
    margin: 20px 0;
    position: relative;
    display: inline-block;
}

.qr img {
    width: 180px;
    height: 180px;
    border-radius: 12px;
    filter: grayscale(1) invert(1); /* Makes QR match B&W theme */
    padding: 10px;
    background: white;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    transition: transform 0.3s ease;
}

.qr img:hover {
    transform: scale(1.05);
}

/* INPUT STYLING */
input {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    margin: 8px 0;
    background: #111;
    border: 1px solid var(--accent-border);
    border-radius: 12px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: var(--glow-color);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
}

/* GLOWING BUTTON */
button {
    margin-top: 20px;
    background: var(--text-main);
    color: black;
    padding: 15px;
    width: 100%;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    box-shadow: 0 0 0px rgba(255, 255, 255, 0);
}

button:hover {
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    transform: translateY(-2px);
}

button:active {
    transform: scale(0.98);
}

/* KEYFRAMES */
@keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes borderGlow {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

</style>

</head>

<body>

<div class="card">

<h2 id="title">Payment</h2>
<p class="sub" id="subtitle">Waiting for details...</p>

<div class="qr">
    <img src="https://raw.githubusercontent.com/developer9692-boop/Payment/main/br.png" alt="QR Code">
</div>

<input type="text" id="txn" placeholder="Transaction ID">
<input type="number" id="amount" placeholder="Amount Paid">

<button onclick="submitData()">Verify Payment</button>

</div>

<script>
/* ================= KEEPING YOUR ORIGINAL LOGIC ================= */

const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const params = new URLSearchParams(window.location.search);
const service = params.get("service");
const price   = params.get("price");

if(service && price){
    document.getElementById("title").innerText = service;
    document.getElementById("subtitle").innerText = "TOTAL DUE: ₹" + price;
}

function submitData(){
    let txn = document.getElementById("txn").value.trim();
    let amount = document.getElementById("amount").value.trim();

    if(!txn || !amount){
        // Basic alert replaced by TG Haptic for better UX
        tg.HapticFeedback.notificationOccurred('error');
        alert("⚠️ All fields required");
        return;
    }

    tg.sendData(JSON.stringify({
        txn: txn,
        amount: amount,
        service: service,
        price: price
    }));

    tg.close();
}
</script>

</body>
</html>
